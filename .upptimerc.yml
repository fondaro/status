# Fondaro status page — powered by Upptime (https://upptime.js.org)
# Config plan: fondaro-mono/docs/plans/2026-06-04-status-page.md
owner: fondaro
repo: status

sites:
  - name: Marketing site
    url: https://fondaro.com
  - name: App (sign-in)
    url: https://www.fondaro.com/sign-in
    # The dashboard itself is Clerk-gated and currently SSR-500s for
    # unauthenticated probes, so we monitor the public sign-in entry as the
    # "app is reachable" signal. Swap for the public /api/health function check
    # in Phase 1.
  - name: API
    url: https://api.fondaro.com/health      # 503 if the main OR properties DB is down

  # --- Phase 1: uncomment each once its endpoint/host is live ---
  # - name: Web app (functions)
  #   url: https://fondaro.com/api/health     # needs apps/web app/api/health/route.ts
  # - name: API process
  #   url: https://api.fondaro.com/health/live  # needs apps/api GET /health/live
  # - name: Sanity Studio
  #   url: https://<studio-host>              # studio.fondaro.com does NOT resolve yet
  # - name: Brand sites
  #   url: https://<brand-sites-host>         # confirm canonical URL

status-website:
  cname: status.fondaro.com
  name: Fondaro Status
  introTitle: "Fondaro system status"
  introMessage: "Live status and uptime history for Fondaro. Powered by Upptime."
  navbar:
    - title: Status
      href: /
    - title: Incidents
      href: https://github.com/fondaro/status/issues
